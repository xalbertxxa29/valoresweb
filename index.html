<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="only light" />
  <style>:root{color-scheme:only light!important}html,body{color-scheme:light!important}</style>
  <title>Liderman — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="login-body">

  <!-- Fondo animado con burbujas -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Layout dos columnas -->
  <div class="login-wrapper">

    <!-- Columna izquierda — Branding -->
    <div class="login-brand">
      <div class="brand-content">
        <img src="imagenes/logo.png" alt="Liderman Logo" class="brand-logo">
        <h1 class="brand-title">Gestión de <span class="brand-highlight">Clientes</span></h1>
        <p class="brand-desc">Plataforma centralizada para gestionar solicitudes, contratos y métricas comerciales en tiempo real.</p>

        <div class="brand-stats">
          <div class="brand-stat">
            <span class="brand-stat-value">100%</span>
            <span class="brand-stat-label">Datos en tiempo real</span>
          </div>
          <div class="brand-stat">
            <span class="brand-stat-value">24/7</span>
            <span class="brand-stat-label">Disponibilidad</span>
          </div>
          <div class="brand-stat">
            <span class="brand-stat-value">+50k</span>
            <span class="brand-stat-label">Registros gestionados</span>
          </div>
        </div>
      </div>

      <!-- Decoración geométrica -->
      <div class="brand-decor">
        <div class="decor-ring decor-ring-1"></div>
        <div class="decor-ring decor-ring-2"></div>
        <div class="decor-ring decor-ring-3"></div>
      </div>
    </div>

    <!-- Columna derecha — Formulario -->
    <div class="login-form-panel">
      <div class="login-card">
        <!-- Top badge -->
        <div class="login-badge">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <span>Acceso seguro</span>
        </div>

        <h2 class="form-title">Bienvenido de vuelta</h2>
        <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

        <form id="login-form" role="form" aria-label="Formulario de inicio de sesión">

          <!-- Email -->
          <div class="field-group">
            <label for="username" class="field-label">Correo electrónico</label>
            <div class="field-input-wrap">
              <span class="field-icon">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </span>
              <input type="email" id="username" placeholder="tu@correo.com" required aria-required="true" autocomplete="email">
            </div>
          </div>

          <!-- Contraseña -->
          <div class="field-group">
            <label for="password" class="field-label">Contraseña</label>
            <div class="field-input-wrap password-wrap">
              <span class="field-icon">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              </span>
              <input type="password" id="password" placeholder="••••••••" required aria-required="true" autocomplete="current-password">
              <button type="button" id="togglePassword" class="toggle-pass" aria-label="Mostrar/ocultar contraseña">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <!-- Recordarme -->
          <div class="field-remember">
            <label class="custom-check">
              <input type="checkbox" id="remember">
              <span class="checkmark"></span>
              <span class="check-label">Recordarme</span>
            </label>
          </div>

          <!-- Error -->
          <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>

          <!-- Botón -->
          <button id="login-btn" type="submit">
            <span class="btn-text">Iniciar sesión</span>
            <span class="btn-arrow">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            </span>
          </button>

          <!-- Políticas -->
          <div class="form-footer">
            <a href="#">Políticas de Privacidad</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" hidden role="status" aria-live="polite" aria-busy="true">
    <span class="visually-hidden" id="live-status"></span>
    <div class="spinner"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
